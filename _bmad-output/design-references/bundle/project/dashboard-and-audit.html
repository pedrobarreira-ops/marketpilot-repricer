<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketPilot Repricer · Pass 2 Visual Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
<style>
  :root {
    --mp-primary:        #1a2233;
    --mp-primary-2:      #2a3550;
    --mp-primary-tint:   #c8d0e0;

    --mp-bg:             #f5f7fa;
    --mp-surface:        #ffffff;
    --mp-surface-2:      #fafbfd;

    --mp-ink:            #1a2233;
    --mp-ink-2:          #4a5366;
    --mp-ink-3:          #8590a3;

    --mp-line:           #e2e6ee;
    --mp-line-soft:      #eef1f6;

    --mp-win:            #2d8b5f;
    --mp-win-soft:       #e8f5ee;
    --mp-loss:           #c4453a;
    --mp-loss-soft:      #fae8e6;
    --mp-warn:           #c47a1c;
    --mp-warn-soft:      #fbf0dd;
    --mp-info:           #3a6ea8;
    --mp-info-soft:      #e7eef8;

    --mp-radius-sm:      8px;
    --mp-radius:         12px;
    --mp-radius-lg:      16px;

    --mp-font-display:   'Manrope', system-ui, sans-serif;
    --mp-font-body:      'Inter', system-ui, sans-serif;
    --mp-font-mono:      'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--mp-font-body);
    background: var(--mp-bg);
    color: var(--mp-ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-display { font-family: var(--mp-font-display); }
  .tabular { font-family: var(--mp-font-mono); font-feature-settings: 'tnum'; }
  button { font-family: inherit; }
  input { font-family: inherit; }

  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-variation-settings: 'opsz' 24, 'wght' 400, 'FILL' 0, 'GRAD' 0;
    font-size: inherit;
    line-height: 1;
    user-select: none;
    vertical-align: middle;
  }
  .msym-fill {
    font-variation-settings: 'opsz' 24, 'wght' 500, 'FILL' 1, 'GRAD' 0;
  }

  /* Skeleton shimmer */
  .skel {
    background: linear-gradient(90deg, #eef1f6 0%, #e2e6ee 50%, #eef1f6 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.96); }
  }

  .live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--mp-win);
    box-shadow: 0 0 0 0 color-mix(in oklch, var(--mp-win) 50%, transparent);
    animation: pulse 2s ease-in-out infinite;
  }

  /* Design canvas tweaks */
  .dc-root { background: #ebeef3 !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dashboard-shared.jsx"></script>
<script type="text/babel" src="dashboard-kpi.jsx"></script>
<script type="text/babel" src="dashboard-audit.jsx"></script>
<script type="text/babel" src="audit-surfaces.jsx"></script>
<script type="text/babel" src="modal-shared.jsx"></script>
<script type="text/babel" src="phase-c.jsx"></script>
<script type="text/babel" src="phase-d.jsx"></script>
<script type="text/babel" src="phase-e-mobile.jsx"></script>

<script type="text/babel" data-presets="react">
// useState is already exposed on window by dashboard-shared.jsx

// =================================================================
// Per-screen composers
// =================================================================

function DashFrame({ children, channel, setChannel, screen, paused, setPaused }) {
  return (
    <div style={{ minHeight: '100%', background: 'var(--mp-bg)' }}>
      <DashHeader
        channel={channel} setChannel={setChannel}
        paused={paused} screen={screen}
        onTogglePause={() => setPaused(!paused)}
      />
      <main style={{
        maxWidth: 1400, margin: '0 auto',
        padding: '32px 32px 64px',
        display: 'flex', flexDirection: 'column', gap: 20,
      }}>
        {children}
      </main>
    </div>
  );
}

// ---------- LOADING ----------
function ScreenLoading({ channel, setChannel }) {
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="dash-loading">
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div>
          <div className="skel" style={{ width: 220, height: 28, marginBottom: 10 }} />
          <div className="skel" style={{ width: 320, height: 14 }} />
        </div>
      </div>
      <section style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
        <KpiSkeleton /><KpiSkeleton /><KpiSkeleton />
      </section>
      <div className="skel" style={{ height: 86, borderRadius: 'var(--mp-radius-lg)' }} />
      <div className="skel" style={{ height: 78, borderRadius: 'var(--mp-radius-lg)' }} />
      <p className="tabular" style={{
        textAlign: 'center', fontSize: 12, color: 'var(--mp-ink-3)',
        margin: '8px 0 0',
      }}>
        <span className="live-dot" style={{ marginRight: 8, verticalAlign: 'middle' }} />
        A sincronizar com Mirakl Worten · primeira leitura
      </p>
    </DashFrame>
  );
}

// ---------- DRY-RUN ----------
function ScreenDryRun({ channel, setChannel }) {
  const [paused, setPaused] = useState(false);
  const [marginExpanded, setMarginExpanded] = useState(true);
  const data = KPI_DATA[channel];
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="dash-dryrun" paused={paused} setPaused={setPaused}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 16 }}>
        <div>
          <p style={{ margin: '0 0 6px', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--mp-ink-3)' }}>
            <span className="live-dot" style={{ marginRight: 8, verticalAlign: 'middle', background: 'var(--mp-info)' }} />
            Modo simulação · Worten {channel === 'pt' ? 'Portugal' : 'Espanha'}
          </p>
          <h1 className="font-display" style={{ margin: 0, fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)', letterSpacing: '-0.02em' }}>
            Olá, Tomás
          </h1>
        </div>
        <p className="tabular" style={{ margin: 0, fontSize: 12, color: 'var(--mp-ink-3)' }}>
          Última sincronização <span style={{ color: 'var(--mp-ink-2)', fontWeight: 600 }}>14:22:08</span>
        </p>
      </div>

      <Banner kind="dryrun" action={{ label: 'Ir live' }}>
        <strong style={{ fontWeight: 700 }}>Modo simulação activo.</strong>{' '}
        Os números abaixo mostram o que <em>aconteceria</em> se estivesses em modo live. Nenhum preço foi alterado.
      </Banner>

      <KpiRow data={data} />
      <HojeStrip data={data} />
      <MarginEditor expanded={marginExpanded} setExpanded={setMarginExpanded} />
      <GoLiveCta data={data} />
    </DashFrame>
  );
}

// ---------- LIVE ----------
function ScreenLive({ channel, setChannel }) {
  const [paused, setPaused] = useState(false);
  const [marginExpanded, setMarginExpanded] = useState(false);
  const data = KPI_DATA[channel];
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="dash-live" paused={paused} setPaused={setPaused}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 16 }}>
        <div>
          <p style={{ margin: '0 0 6px', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--mp-win)' }}>
            <span className="live-dot" style={{ marginRight: 8, verticalAlign: 'middle' }} />
            Modo live · Worten {channel === 'pt' ? 'Portugal' : 'Espanha'}
          </p>
          <h1 className="font-display" style={{ margin: 0, fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)', letterSpacing: '-0.02em' }}>
            Olá, Tomás
          </h1>
        </div>
        <p className="tabular" style={{ margin: 0, fontSize: 12, color: 'var(--mp-ink-3)' }}>
          Última decisão <span style={{ color: 'var(--mp-ink-2)', fontWeight: 600 }}>há 47s</span>
        </p>
      </div>

      <KpiRow data={data} />
      <HojeStrip data={data} />
      <AtencaoEmpty />
      <MarginEditor expanded={marginExpanded} setExpanded={setMarginExpanded} />
    </DashFrame>
  );
}

// ---------- PAUSED BY CUSTOMER ----------
function ScreenPausedCustomer({ channel, setChannel }) {
  const [paused, setPaused] = useState(true);
  const data = KPI_DATA[channel];
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="dash-paused-cust" paused={paused} setPaused={setPaused}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 16 }}>
        <div>
          <p style={{ margin: '0 0 6px', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--mp-ink-3)' }}>
            Repricing pausado · Worten {channel === 'pt' ? 'Portugal' : 'Espanha'}
          </p>
          <h1 className="font-display" style={{ margin: 0, fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)', letterSpacing: '-0.02em' }}>
            Olá, Tomás
          </h1>
        </div>
      </div>
      <Banner kind="paused" action={{ label: 'Retomar repricing' }}>
        <strong style={{ fontWeight: 700 }}>Pausaste o repricing há 2h 14min.</strong>{' '}
        Os teus preços estão fixos onde estavam às 12:08. Nada será alterado até retomares.
      </Banner>
      <PausedByCustomerStrip data={data} />
      <KpiRow data={data} dimmed />
    </DashFrame>
  );
}

// ---------- PAUSED BY PAYMENT ----------
function ScreenPausedPayment({ channel, setChannel }) {
  const [paused, setPaused] = useState(true);
  const data = KPI_DATA[channel];
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="dash-paused-pay" paused={paused} setPaused={setPaused}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 16 }}>
        <div>
          <p style={{ margin: '0 0 6px', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--mp-loss)' }}>
            Pausa por falha de pagamento
          </p>
          <h1 className="font-display" style={{ margin: 0, fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)', letterSpacing: '-0.02em' }}>
            Olá, Tomás
          </h1>
        </div>
      </div>
      <Banner kind="payment" action={{ label: 'Actualizar método de pagamento' }}>
        <strong style={{ fontWeight: 700 }}>O pagamento de {'{DD/MM}'} não foi processado.</strong>{' '}
        Pausámos o repricing automaticamente. Os teus preços ficam onde estão até actualizares o cartão.
      </Banner>
      <Banner kind="transient">
        <strong style={{ fontWeight: 700 }}>Última tentativa:</strong> ontem às 23:14 · Resposta do banco: <span className="tabular">card_declined</span>.
      </Banner>
      <KpiRow data={data} dimmed stale />
      <p style={{ textAlign: 'center', fontSize: 12, color: 'var(--mp-ink-3)', margin: '8px 0 0' }}>
        Os números acima são da última leitura antes da pausa. Não estão a ser actualizados.
      </p>
    </DashFrame>
  );
}

// ---------- AUDIT LOG · 5-surface IA ----------
function ScreenAudit({ channel, setChannel }) {
  const [paused, setPaused] = useState(false);
  const data = KPI_DATA[channel];
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="audit" paused={paused} setPaused={setPaused}>
      {/* Page header */}
      <div>
        <p style={{ margin: '0 0 6px', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--mp-ink-3)' }}>
          Audit log · Worten {channel === 'pt' ? 'Portugal' : 'Espanha'}
        </p>
        <h1 className="font-display" style={{ margin: '0 0 6px', fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)', letterSpacing: '-0.02em' }}>
          Cada decisão de preço, registada
        </h1>
        <p style={{ margin: 0, fontSize: 14, color: 'var(--mp-ink-2)', maxWidth: 640, lineHeight: 1.55 }}>
          Procura por SKU para investigar uma decisão específica, ou usa as listas abaixo para o que precisa da tua atenção hoje.
        </p>
      </div>

      {/* Surface 4 · Search (sticky, prominent) */}
      <AuditSearch />

      {/* Surface 1 · Daily summary */}
      <DailySummary data={data} />

      {/* Surface 2 · Atenção feed */}
      <AtencaoFeed items={ATENCAO_ITEMS} />

      {/* Surface 3 · Notável feed */}
      <NotavelFeed items={NOTAVEL_ITEMS} />
    </DashFrame>
  );
}

// ---------- AUDIT FIREHOSE (Surface 5 standalone) ----------
function ScreenFirehose({ channel, setChannel }) {
  const [paused, setPaused] = useState(false);
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="firehose" paused={paused} setPaused={setPaused}>
      <div>
        <a href="#" style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,
          fontSize: 12, fontWeight: 600, color: 'var(--mp-ink-3)',
          textDecoration: 'none', marginBottom: 10,
        }}>
          <Icon name="arrow_back" style={{ fontSize: 14 }} />
          Voltar ao audit log
        </a>
        <p style={{ margin: '0 0 6px', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--mp-ink-3)' }}>
          Audit log · Firehose
        </p>
        <h1 className="font-display" style={{ margin: '0 0 6px', fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)', letterSpacing: '-0.02em' }}>
          Todos os ajustes, agregados por ciclo
        </h1>
        <p style={{ margin: 0, fontSize: 14, color: 'var(--mp-ink-2)', maxWidth: 640, lineHeight: 1.55 }}>
          Verificação de confiança. Cada ciclo é uma execução do repricer. Expande para ver o resumo agregado e, se quiseres, mergulhar até cada SKU.
        </p>
      </div>
      <FirehoseView cycles={FIREHOSE_CYCLES} />
    </DashFrame>
  );
}

// ---------- MARGIN EDITOR (expanded, focused) ----------
function ScreenMarginEditor({ channel, setChannel }) {
  const [paused, setPaused] = useState(false);
  const [expanded, setExpanded] = useState(true);
  return (
    <DashFrame channel={channel} setChannel={setChannel} screen="margin-editor" paused={paused} setPaused={setPaused}>
      <div>
        <p style={{ margin: '0 0 6px', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--mp-ink-3)' }}>
          Definições · Margens
        </p>
        <h1 className="font-display" style={{ margin: '0 0 6px', fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)', letterSpacing: '-0.02em' }}>
          Margem de tolerância
        </h1>
        <p style={{ margin: 0, fontSize: 14, color: 'var(--mp-ink-2)', maxWidth: 640, lineHeight: 1.55 }}>
          Define quanto é que o MarketPilot pode mexer nos teus preços. Vês o impacto num produto real do teu catálogo antes de guardar.
        </p>
      </div>
      <MarginEditor expanded={expanded} setExpanded={setExpanded} />
    </DashFrame>
  );
}

// =================================================================
// Canvas
// =================================================================

const ARTBOARD_W = 1440;
const ARTBOARDS = [
  { id: 'dash-loading',     label: '01 · Loading · primeira sincronização',                screen: ScreenLoading,        height: 900,  scroll: true },
  { id: 'dash-dryrun',      label: '02 · Dry-run · simulação activa',                       screen: ScreenDryRun,         height: 1080, scroll: true },
  { id: 'dash-live',        label: '03 · Live · operação normal · nada para rever',         screen: ScreenLive,           height: 1080, scroll: true },
  { id: 'dash-paused-cust', label: '04 · Pausa por cliente · estado fixo',                  screen: ScreenPausedCustomer, height: 900,  scroll: true },
  { id: 'dash-paused-pay',  label: '05 · Pausa por falha de pagamento · interception',      screen: ScreenPausedPayment,  height: 900,  scroll: true },
  { id: 'audit',            label: '06 · Audit log · 5 superfícies (Daily · Atenção · Notável · Search · Firehose)', screen: ScreenAudit, height: 1080, scroll: true },
  { id: 'firehose',         label: '06b · Audit log firehose · ciclo 03:14 expandido',      screen: ScreenFirehose,       height: 1080, scroll: true },
  { id: 'margin-editor',    label: '07 · Margin editor · painel inline expandido',          screen: ScreenMarginEditor,   height: 1080, scroll: true },
  { id: 'go-live-modal',    label: '08 · Modal Ir live · consent (over dry-run)',           screen: ScreenGoLiveModal,    height: 1080, scroll: false },
  { id: 'anomaly-modal',    label: '09 · Modal anomalia · review (over live + banner)',     screen: ScreenAnomalyModal,   height: 1080, scroll: false },
  { id: 'onb-scan',         label: '10 · Onboarding · scan-ready ("porquê?" expandido)',  screen: ScreenScanReady,      height: 1080, scroll: true },
  { id: 'onb-key',          label: '11 · Onboarding · chave (trust block prominent)',        screen: ScreenOnboardingKey,  height: 1080, scroll: true },
  { id: 'audit-search',     label: '12 · Audit log search-active · Bose PRI01 failure',     screen: ScreenAuditSearch,    height: 1200, scroll: true },
  { id: 'admin-status',     label: '13 · /admin/status · Founder Status Page',              screen: ScreenAdminStatus,    height: 1080, scroll: true },
  { id: 'key-revoked',      label: '14 · /key-revoked · Worten key revocation interception', screen: ScreenKeyRevoked,    height: 900,  scroll: true },
  { id: 'payment-failed',   label: '15 · /payment-failed · first-login billing interception', screen: ScreenPaymentFailed, height: 900,  scroll: true },
  { id: 'mobile-alert',     label: '21 · Mobile · Alerta crítico (/?alert=X)',                screen: ScreenMobileAlertFramed,  height: 900, scroll: true },
  { id: 'mobile-detail',    label: '21b · Mobile · Detalhe Atenção (anomaly-review)',         screen: ScreenMobileDetailFramed, height: 900, scroll: true },
];

function ChannelToggleStub() { return null; }

function ArtboardScroll({ children, height }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      overflowY: 'auto', overflowX: 'hidden',
      background: 'var(--mp-bg)',
    }}>
      {children}
    </div>
  );
}

function App() {
  const [channel, setChannel] = useState('pt');
  const renderArtboard = (a) => {
    const Screen = a.screen;
    const inner = <Screen channel={channel} setChannel={setChannel} />;
    return (
      <DCArtboard key={a.id} id={a.id} label={a.label} width={ARTBOARD_W} height={a.height}>
        {a.scroll === false ? inner : <ArtboardScroll>{inner}</ArtboardScroll>}
      </DCArtboard>
    );
  };
  return (
    <DesignCanvas>
      <DCSection id="dashboard" title="Dashboard root · 5 estados">
        {ARTBOARDS.slice(0, 5).map(renderArtboard)}
      </DCSection>

      <DCSection id="audit" title="Audit log · 5-surface IA + firehose">
        {ARTBOARDS.slice(5, 7).map(renderArtboard)}
      </DCSection>

      <DCSection id="margin" title="Margin editor · painel expandido">
        {[ARTBOARDS[7]].map(renderArtboard)}
      </DCSection>

      <DCSection id="modals" title="Modais · consent + anomaly">
        {ARTBOARDS.slice(8, 10).map(renderArtboard)}
      </DCSection>

      <DCSection id="onboarding" title="Onboarding · chave + scan-ready">
        {ARTBOARDS.slice(10, 12).map(renderArtboard)}
      </DCSection>

      <DCSection id="audit-search" title="Audit log · busca activa">
        {[ARTBOARDS[12]].map(renderArtboard)}
      </DCSection>

      <DCSection id="admin" title="Admin · founder view (visual register diferente)">
        {[ARTBOARDS[13]].map(renderArtboard)}
      </DCSection>

      <DCSection id="interception" title="Interceptions · key revoked + payment failed (first login)">
        {ARTBOARDS.slice(14, 16).map(renderArtboard)}
      </DCSection>

      <DCSection id="mobile" title="Mobile · 22:47 Tuesday flow (crítico-only)">
        {ARTBOARDS.slice(16, 18).map(renderArtboard)}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

function useCountUp(target, duration = 1000, start = 0) {
  const [val, setVal] = useState(start);
  useEffect(() => {
    let raf; const t0 = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - t0) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(start + (target - start) * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return val;
}

// SCREEN 2 — PROGRESS
// ═════════════════════════════════════════════════════════════════════
function ProgressScreen({ onDone, email }) {
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [count, setCount] = useState(0);
  const [copied, setCopied] = useState(false);
  const reportUrl = "https://marketpilot.pt/report/abc-123-xy-9f";

  useEffect(() => {
    const phase = PROGRESS_PHASES[phaseIdx];
    if (!phase) { onDone(); return; }
    const start = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - start) / phase.duration);
      const eased = 1 - Math.pow(1 - p, 2);
      setCount(Math.round(phase.total * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
      else {
        setTimeout(() => {
          if (phaseIdx < PROGRESS_PHASES.length - 1) {
            setPhaseIdx(phaseIdx + 1);
            setCount(0);
          } else {
            setTimeout(onDone, 600);
          }
        }, 200);
      }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [phaseIdx]);

  const handleCopy = async () => {
    try { await navigator.clipboard.writeText(reportUrl); } catch {}
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  };

  const overallPct = ((phaseIdx + (count / (PROGRESS_PHASES[phaseIdx]?.total || 1))) / PROGRESS_PHASES.length) * 100;

  return (
    <>
      <Header screen="progress" />
      <main style={{
        flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '48px 24px 64px',
      }}>
        <div style={{ width: '100%', maxWidth: 560, animation: 'fadeUp 0.5s ease-out' }}>
          {/* Glyph */}
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 28 }}>
            <div style={{
              position: 'relative',
              width: 80, height: 80, borderRadius: '50%',
              background: 'var(--mp-surface)',
              border: '1px solid var(--mp-line-soft)',
              display: 'grid', placeItems: 'center',
              boxShadow: 'var(--mp-shadow-md)',
            }}>
              <Icon name="radar" fill style={{ color: 'var(--mp-primary)', fontSize: 36, animation: 'pulseDot 2.4s ease-in-out infinite' }} />
              <svg style={{ position: 'absolute', inset: -4 }} viewBox="0 0 88 88">
                <circle cx="44" cy="44" r="40"
                  fill="none" stroke="var(--mp-line)" strokeWidth="2" />
                <circle cx="44" cy="44" r="40"
                  fill="none" stroke="var(--mp-primary)" strokeWidth="2"
                  strokeDasharray={2 * Math.PI * 40}
                  strokeDashoffset={(2 * Math.PI * 40) * (1 - overallPct/100)}
                  strokeLinecap="round"
                  transform="rotate(-90 44 44)"
                  style={{ transition: 'stroke-dashoffset 0.2s linear' }} />
              </svg>
            </div>
          </div>

          {/* Card */}
          <div style={{
            background: 'var(--mp-surface)',
            border: '1px solid var(--mp-line-soft)',
            borderRadius: 'var(--mp-radius-lg)',
            padding: 40,
            boxShadow: 'var(--mp-shadow-lg)',
          }}>
            <h1 className="font-display" style={{
              fontSize: 28, fontWeight: 800, color: 'var(--mp-primary)',
              margin: '0 0 6px', textAlign: 'center',
            }}>A gerar o teu relatório...</h1>
            <p style={{
              margin: '0 0 28px', textAlign: 'center',
              color: 'var(--mp-ink-3)', fontSize: 14,
            }}>Podes fechar esta página — enviamos um email quando estiver pronto.</p>

            {/* Progress bar */}
            <div style={{
              height: 6, background: 'var(--mp-line-soft)',
              borderRadius: 999, overflow: 'hidden', marginBottom: 16,
              position: 'relative',
            }}>
              <div style={{
                height: '100%', width: `${overallPct}%`,
                background: 'linear-gradient(90deg, var(--mp-primary), var(--mp-primary-2))',
                borderRadius: 999,
                transition: 'width 0.2s linear',
                position: 'relative', overflow: 'hidden',
              }}>
                <div style={{
                  position: 'absolute', inset: 0,
                  background: 'linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent)',
                  animation: 'shimmer 1.8s ease-in-out infinite',
                }} />
              </div>
            </div>

            {/* Phase list */}
            <div style={{ marginBottom: 28 }}>
              {PROGRESS_PHASES.map((p, i) => {
                const isDone = i < phaseIdx;
                const isActive = i === phaseIdx;
                return (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'center', gap: 12,
                    padding: '10px 0',
                    borderBottom: i < PROGRESS_PHASES.length - 1 ? '1px solid var(--mp-line-soft)' : 'none',
                    opacity: isActive || isDone ? 1 : 0.4,
                    transition: 'opacity 0.3s',
                  }}>
                    <div style={{
                      width: 22, height: 22, borderRadius: '50%',
                      display: 'grid', placeItems: 'center',
                      background: isDone ? 'var(--mp-win)' : isActive ? 'var(--mp-primary)' : 'var(--mp-line)',
                      color: '#fff', flexShrink: 0,
                    }}>
                      {isDone ? (
                        <Icon name="check" style={{ fontSize: 14 }} />
                      ) : isActive ? (
                        <Icon name="progress_activity" style={{ fontSize: 14, animation: 'spin 1s linear infinite' }} />
                      ) : (
                        <span style={{ fontSize: 11, fontWeight: 700 }}>{i + 1}</span>
                      )}
                    </div>
                    <div style={{ flex: 1, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 12 }}>
                      <span style={{
                        fontSize: 14, fontWeight: isActive ? 600 : 500,
                        color: isActive ? 'var(--mp-primary)' : 'var(--mp-ink-2)',
                      }}>{p.label}</span>
                      {isActive && (
                        <span className="tabular" style={{ fontSize: 13, color: 'var(--mp-ink-3)', fontWeight: 500 }}>
                          {fmtNum(count)} / {fmtNum(p.total)}
                        </span>
                      )}
                      {isDone && (
                        <span className="tabular" style={{ fontSize: 12, color: 'var(--mp-win)', fontWeight: 600 }}>
                          ✓ {fmtNum(p.total)}
                        </span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Link box */}
            <div style={{
              background: 'var(--mp-bg)',
              border: '1px solid var(--mp-line-soft)',
              borderRadius: 'var(--mp-radius-sm)',
              padding: 16,
            }}>
              <p style={{
                margin: '0 0 10px', fontSize: 11, fontWeight: 700,
                letterSpacing: '0.08em', textTransform: 'uppercase',
                color: 'var(--mp-primary)',
              }}>Guarda este link — disponível 48 horas</p>
              <div style={{
                display: 'flex', alignItems: 'center', gap: 8,
                background: 'var(--mp-surface)',
                border: '1px solid var(--mp-line)',
                borderRadius: 'var(--mp-radius-sm)',
                padding: '10px 12px',
              }}>
                <code className="font-mono" style={{
                  flex: 1, fontSize: 13, color: 'var(--mp-primary)',
                  fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                }}>{reportUrl}</code>
                <button onClick={handleCopy} style={{
                  display: 'flex', alignItems: 'center', gap: 6,
                  padding: '6px 10px', background: copied ? 'var(--mp-win-soft)' : 'var(--mp-bg)',
                  border: `1px solid ${copied ? 'var(--mp-win)' : 'var(--mp-line)'}`,
                  borderRadius: 6, cursor: 'pointer',
                  fontSize: 12, fontWeight: 600,
                  color: copied ? 'var(--mp-win)' : 'var(--mp-primary)',
                  transition: 'all 0.15s',
                }}>
                  <Icon name={copied ? 'check' : 'content_copy'} style={{ fontSize: 14 }} />
                  {copied ? 'Copiado' : 'Copiar'}
                </button>
              </div>
            </div>

            <p style={{
              margin: '20px 0 0', fontSize: 12, color: 'var(--mp-ink-3)',
              textAlign: 'center', lineHeight: 1.5,
            }}>
              <Icon name="mail" style={{ fontSize: 14, verticalAlign: -2, marginRight: 4 }} />
              Vais receber também um email {email ? <>em <strong style={{ color: 'var(--mp-ink-2)' }}>{email}</strong></> : 'com o link'} quando estiver pronto.
            </p>
          </div>
        </div>
      </main>
      <Footer />
    </>
  );
}

function StatCard({ label, value, valueLine, icon, tone, subtitle, delay, variant }) {
  const count = useCountUp(value, 1400);
  const toneMap = {
    win: { bg: 'var(--mp-win-soft)', fg: 'var(--mp-win)', border: 'color-mix(in oklch, var(--mp-win) 20%, transparent)' },
    loss: { bg: 'var(--mp-loss-soft)', fg: 'var(--mp-loss)', border: 'color-mix(in oklch, var(--mp-loss) 20%, transparent)' },
    neutral: { bg: 'var(--mp-neutral-soft)', fg: 'var(--mp-neutral)', border: 'color-mix(in oklch, var(--mp-neutral) 20%, transparent)' },
    reach: { bg: 'var(--mp-win-soft)', fg: 'var(--mp-win)', border: 'color-mix(in oklch, var(--mp-win) 20%, transparent)' },
  };
  const t = toneMap[tone];

  // Reach card has two visual variants
  const isReachNavy = tone === 'reach' && variant === 'navy';
  const isReachGreen = tone === 'reach' && variant === 'green';

  const cardBg = isReachNavy
    ? 'linear-gradient(135deg, var(--mp-primary), var(--mp-primary-2))'
    : isReachGreen
      ? 'color-mix(in oklch, var(--mp-win) 10%, var(--mp-surface))'
      : 'var(--mp-surface)';

  const cardBorder = isReachNavy
    ? 'transparent'
    : isReachGreen
      ? 'color-mix(in oklch, var(--mp-win) 35%, transparent)'
      : 'var(--mp-line-soft)';

  const labelColor = isReachNavy ? 'color-mix(in oklch, var(--mp-primary-tint) 80%, white)' : isReachGreen ? 'var(--mp-win)' : 'var(--mp-ink-3)';
  const numColor = isReachNavy ? '#fff' : isReachGreen ? 'var(--mp-primary)' : 'var(--mp-primary)';
  const subColor = isReachNavy ? 'color-mix(in oklch, var(--mp-primary-tint) 90%, white)' : 'var(--mp-ink-2)';
  const valueLineColor = isReachNavy ? '#fff' : isReachGreen ? 'var(--mp-win)' : 'var(--mp-ink-2)';

  return (
    <div style={{
      background: cardBg,
      border: `1px solid ${cardBorder}`,
      borderRadius: 'var(--mp-radius-lg)',
      padding: 24,
      position: 'relative', overflow: 'hidden',
      animation: `fadeUp 0.5s ease-out ${delay}s both`,
      transition: 'transform 0.2s, box-shadow 0.2s',
      boxShadow: isReachNavy ? '0 8px 24px color-mix(in oklch, var(--mp-primary) 20%, transparent)' : 'none',
    }}
    onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = isReachNavy ? '0 12px 32px color-mix(in oklch, var(--mp-primary) 30%, transparent)' : 'var(--mp-shadow-md)'; }}
    onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = isReachNavy ? '0 8px 24px color-mix(in oklch, var(--mp-primary) 20%, transparent)' : 'none'; }}>
      {/* Decorative wash for navy variant */}
      {isReachNavy && (
        <div style={{
          position: 'absolute', right: -40, bottom: -40,
          width: 140, height: 140, borderRadius: '50%',
          background: 'radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%)',
          pointerEvents: 'none',
        }} />
      )}

      <div style={{
        position: 'absolute', top: 18, right: 18,
        width: 32, height: 32, borderRadius: 8,
        background: isReachNavy ? 'rgba(255,255,255,0.15)' : t.bg,
        color: isReachNavy ? '#fff' : t.fg,
        border: isReachNavy ? '1px solid rgba(255,255,255,0.2)' : `1px solid ${t.border}`,
        display: 'grid', placeItems: 'center',
      }}>
        <Icon name={icon} fill style={{ fontSize: 18 }} />
      </div>
      <p style={{
        margin: '0 0 10px', fontSize: 10, fontWeight: 700,
        letterSpacing: '0.12em', textTransform: 'uppercase',

      }}>{label}</p>
      <div className="tabular font-display" style={{

        <div style={{
          paddingTop: 10, marginTop: 4,

          position: 'relative', zIndex: 1,

            fontSize: 14, fontWeight: 700, color: valueLineColor,

            marginTop: 2,
          }}>{valueLine.label}</div>
        </div>
      )}
    </div>
  );
}

  const OptionRow = ({ label, children }) => (
    <div style={{ marginBottom: 18 }}>

          options={[
            { value: 'form', label: '1. Form' },
            { value: 'progress', label: '2. Progress' },
            { value: 'report', label: '3. Report' },
          ]}
          onChange={onJumpScreen}
        />
      </OptionRow>

      <OptionRow label="Accent">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
          {Object.entries(ACCENT_MAP).map(([key, val]) => (
            <button key={key} onClick={() => update('accent', key)} title={key} style={{
              height: 32, border: tweaks.accent === key ? '2px solid var(--mp-primary)' : '1px solid var(--mp-line)',
              borderRadius: 6, cursor: 'pointer', padding: 0, overflow: 'hidden',
              background: val.primary,
              position: 'relative',
            }}>
              <span style={{
                position: 'absolute', inset: 0,
                display: 'grid', placeItems: 'center',
                color: '#fff', fontSize: 9, fontWeight: 700,
                letterSpacing: '0.08em', textTransform: 'uppercase',
              }}>{key}</span>
            </button>
          ))}
        </div>
      </OptionRow>

      <OptionRow label="Corner radius">
        <Segment
          value={tweaks.radius}
          options={[
            { value: 'sharp', label: 'Sharp' },
            { value: 'medium', label: 'Medium' },
            { value: 'round', label: 'Round' },
          ]}
          onChange={(v) => update('radius', v)}
        />
      </OptionRow>

      <OptionRow label="Trust message (form)">
        <Segment
          value={tweaks.trustStyle}
          options={[
            { value: 'subtle', label: 'Subtle' },
            { value: 'prominent', label: 'Prominent' },
          ]}
          onChange={(v) => update('trustStyle', v)}
        />
      </OptionRow>

      <OptionRow label="“A um passo do 1.º” card (report)">
        <Segment
          value={tweaks.reachStyle}
          options={[
            { value: 'navy', label: 'Navy fill' },
            { value: 'green', label: 'Green tint' },
          ]}
          onChange={(v) => update('reachStyle', v)}
        />
      </OptionRow>

      <OptionRow label="Hero layout (form)">
        <Segment
          value={tweaks.heroLayout}
          options={[
            { value: 'centered', label: 'Centered' },
            { value: 'left', label: 'Left' },
            { value: 'wide', label: 'Wide' },
          ]}
          onChange={(v) => update('heroLayout', v)}
        />
      </OptionRow>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════
// APP
// ═════════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('mp_screen') || TWEAK_DEFAULTS.startScreen || 'form');
  const [formData, setFormData] = useState({});
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { localStorage.setItem('mp_screen', screen); }, [screen]);

  // Apply tweaks → CSS vars
  useEffect(() => {
    const root = document.documentElement;
    const a = ACCENT_MAP[tweaks.accent] || ACCENT_MAP.navy;
    const r = RADIUS_MAP[tweaks.radius] || RADIUS_MAP.medium;
    root.style.setProperty('--mp-primary', a.primary);
    root.style.setProperty('--mp-primary-2', a.primary2);
    root.style.setProperty('--mp-primary-tint', a.tint);
    root.style.setProperty('--mp-radius', r.r);
    root.style.setProperty('--mp-radius-sm', r.rSm);
    root.style.setProperty('--mp-radius-lg', r.rLg);
  }, [tweaks]);

  // Tweaks host protocol
  useEffect(() => {
    const onMessage = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMessage);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMessage);
  }, []);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }} data-screen-label={
      screen === 'form' ? '01 Form' : screen === 'progress' ? '02 Progress' : '03 Report'
    }>
      {screen === 'form' && (
        <FormScreen tweaks={tweaks} onSubmit={(d) => { setFormData(d); setScreen('progress'); }} />
      )}
      {screen === 'progress' && (
        <ProgressScreen email={formData.email} onDone={() => setScreen('report')} />
      )}
      {screen === 'report' && (
        <ReportScreen onRestart={() => setScreen('form')} reachStyle={tweaks.reachStyle} />
      )}

      {/* Floating screen switcher (visible outside tweaks too) */}
      <div style={{
        position: 'fixed', bottom: 20, left: 20, zIndex: 50,
        display: 'flex', gap: 4, padding: 4,
        background: 'var(--mp-surface)',
        border: '1px solid var(--mp-line)',
        borderRadius: 10,
        boxShadow: 'var(--mp-shadow-md)',
      }}>
        {[
          { id: 'form', label: '1', name: 'Form' },
          { id: 'progress', label: '2', name: 'Progress' },
          { id: 'report', label: '3', name: 'Report' },
        ].map(s => (
          <button key={s.id} onClick={() => setScreen(s.id)} title={s.name} style={{
            padding: '6px 12px',
            background: screen === s.id ? 'var(--mp-primary)' : 'transparent',
            color: screen === s.id ? '#fff' : 'var(--mp-ink-2)',
            border: 'none', cursor: 'pointer',
            fontSize: 12, fontWeight: 700, borderRadius: 6,
            fontFamily: 'var(--mp-font-display)',
            display: 'flex', alignItems: 'center', gap: 6,
            transition: 'all 0.15s',
          }}>
            <span className="tabular">{s.label}</span>
            <span style={{ fontSize: 11, fontWeight: 500, opacity: 0.9 }}>{s.name}</span>
          </button>
        ))}
      </div>

      <TweaksPanel
        tweaks={tweaks}
        setTweaks={setTweaks}
        visible={tweaksOpen}
        onClose={() => setTweaksOpen(false)}
        onJumpScreen={setScreen}
        screen={screen}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

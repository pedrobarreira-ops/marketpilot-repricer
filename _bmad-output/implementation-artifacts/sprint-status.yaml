# =============================================================================
# BUNDLE DISPATCH ORDERS — Phase 0 atomicity-bundle linear dispatch enforcement
# =============================================================================
# For each atomicity bundle (rows in `merge_blocks:` sharing the same
# `until_story`), this block declares the SERIAL ORDER in which bundle members
# must dispatch. Phase 0 enforces:
#   (a) Bundle member N is Ready ONLY when its immediate predecessor in this
#       list is in `review` state (or beyond) — NOT when any-higher-numbered
#       bundle sibling is in `review`. Predecessor not in review → ❌ No
#       (bundle predecessor X not yet in review).
#   (b) When the atomicity-bundle exception fires for member N, the new
#       worktree forks from the PR branch of N's IMMEDIATE PREDECESSOR in this
#       list — NOT from the highest-numbered unmerged sibling.
#
# Why: parallel-dispatch within a bundle is a dispatch ERROR. Bundle C's
# Story 7.3 was parallel-dispatched from 7.2 instead of stacking onto 7.6;
# 7.8's worktree then forked from 7.6's tip which was missing
# cooperative-absorb.js → PR #90 fake-gate (recovered via SCP-2026-05-11).
# Bob's ruling 2026-05-11 + Bundle C close-out retro 2026-05-13 Q1.
#
# Future bundles (D, E, ...): sprint-planning MUST declare bundle_dispatch_orders
# at the time the bundle's merge_blocks block is created. Bob's audit 2026-05-11
# §5 identified two future bundle candidates: Story 12.1 transactional
# cycle-outcome; Stories 11.5+10.3 Moloni-survival.
# =============================================================================
bundle_dispatch_orders:
  C:
    - 5-1-master-cron-dispatcher-sql-per-customer-advisory-locks-worker-must-filter-by-customer-eslint-rule
    - 5-2-pri01-staging-schema-cycle-assembly-skeleton

# =============================================================================
# INTEGRATION TEST REQUIRED — Phase 4.5 BAD gate (Epic 1 retro Item 2)
# =============================================================================
# When `integration_test_required: true` is set on a story key, BAD's Phase 4.5
# gate fires after the batch summary, halting until Pedro runs
# `npm run test:integration` locally against a working local Supabase and
# reports pass/fail. Untagged stories (absent from this block) skip the gate
# silently — zero cost for non-integration work.
#
# Default policy (per Epic 1 retro 2026-05-03, Item 2 + Q5):
#   `true` for stories touching:
#     - pg / Postgres pools (direct SQL, db clients)
#     - Supabase Auth (signup, signin, sessions, auth.users triggers)
#     - signed cookies (mp_session etc.)
#     - Mirakl SDK / API client (P11, PRI01, PRI02, PRI03, OF21, A01, PC01)
#     - Stripe SDK / webhooks (subscription, customer-portal, billing, deletion)
#     - Resend SDK (critical alerts, templated emails)
#     - any other external library contract surface (e.g. Moloni)
#   `false` (i.e. absence from this block) for:
#     - pure schema migrations with no business logic
#     - documentation / config-only changes
#     - ESLint rule additions
#     - pure-function utility modules (e.g. shared/money/index.js)
#
# Frequency naturally drops over time as Library Empirical Contracts
# accumulate — Bob adds entries during sharding when the policy applies.
# The inline comment after each `true` entry is read by Phase 4.5's halt
# message as the per-story reason — keep it short and surface-specific.
# =============================================================================
integration_test_required:
  2-1-rls-aware-app-db-client-service-role-worker-db-client-transaction-helper: true   # pg Pool + RLS + auth contract surface
  2-2-rls-regression-suite-ci-block: true   # live RLS verification against Supabase
  9-1-audit-log-partitioned-base-table-priority-derivation-trigger-initial-partition-monthly-partition-cron: true   # audit_log trigger + RLS + compound index existence
  4-1-customer-marketplaces-schema-with-f4-provisioning-cron-state-machine-transitions-matrix: true   # schema + F4 CHECK constraint + RLS isolation + transitionCronState audit emission

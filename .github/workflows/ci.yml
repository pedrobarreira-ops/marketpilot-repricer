# .github/workflows/ci.yml
#
# Story 2.2 / AC#4, AD30, NFR-I3 — CI block on RLS regression failure.
#
# Convention (AD30): every new customer-scoped table migration MUST extend:
#   1. db/seed/test/two-customers.sql (add a row for both test customers)
#   2. tests/integration/rls-regression.test.js CUSTOMER_SCOPED_TABLES array
#   in the same PR. Failure to do so causes `npm run test:rls` to fail.
#
# Supabase in CI:
#   This workflow runs the Supabase local stack inside the GitHub Actions
#   runner via `supabase start` (Docker is pre-installed on ubuntu-latest).
#   The Supabase URL / keys / DB URL are generated fresh per run and read
#   from `supabase status -o env`, then composed into a temporary .env.test.
#   Only ONE GitHub secret is required: MASTER_KEY_BASE64 — the app-level
#   encryption key for vault values, which has nothing to do with Supabase.
#
#   This avoids needing a hosted "test" Supabase project (free-tier limit
#   is 2 projects). The reset-auth-tables.js SAFETY GUARD permits execution
#   because the URL points at 127.0.0.1.

name: CI

# Trigger configuration:
#   - push: only on main, so merges to main run CI once.
#   - pull_request: on every PR (any base branch), so PRs are gated on green CI.
# This avoids the duplicate-run pattern where a push to a PR branch would
# fire BOTH the push and the pull_request workflows for the same commit.
on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  rls-regression:
    name: RLS Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Compose .env.test from Supabase status
        shell: bash
        env:
          MASTER_KEY_BASE64: ${{ secrets.MASTER_KEY_BASE64 }}
        run: |
          set -e
          supabase status -o env > /tmp/sb_env
          set -a
          . /tmp/sb_env
          set +a
          cat > .env.test <<ENVEOF
          SUPABASE_URL=$API_URL
          SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          SUPABASE_SERVICE_ROLE_DATABASE_URL=$DB_URL
          MASTER_KEY_BASE64=$MASTER_KEY_BASE64
          ENVEOF

      - name: Run RLS regression suite
        run: npm run test:rls

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  integration-tests:
    # Bundle C close-out retro 2026-05-13 Q8 Phase 1 (path a, two-phase rollout).
    # Adds CI-enforced safety floor for all integration tests in tests/integration/.
    # Catches the gap surfaced by PR #91 mega-merge — Bundle C atomicity invariants
    # (45 tests across full-cycle/pending-import-id-invariant/circuit-breaker-trip)
    # had no GitHub-level enforcement; only bad-review's local-fallback verified them.
    #
    # Phase 2 (post-Q7 Bundle-C-cleanup PR): expand to full `npm test` once Story 7.2
    # + 7.3 unit-test _expected drift is fixed (5 new fails). The 23 pre-existing
    # unit fails (W2 watch) are pre-Go-Live stabilization scope.
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Compose .env.test from Supabase status
        shell: bash
        env:
          MASTER_KEY_BASE64: ${{ secrets.MASTER_KEY_BASE64 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -e
          supabase status -o env > /tmp/sb_env
          set -a
          . /tmp/sb_env
          set +a
          cat > .env.test <<ENVEOF
          SUPABASE_URL=$API_URL
          SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          SUPABASE_SERVICE_ROLE_DATABASE_URL=$DB_URL
          MASTER_KEY_BASE64=$MASTER_KEY_BASE64
          RESEND_API_KEY=$RESEND_API_KEY
          ENVEOF

      - name: Run integration tests
        # Glob matches all .test.js files in tests/integration/ — covers Bundle C
        # atomicity tests (full-cycle, pending-import-id-invariant, circuit-breaker-trip)
        # AND existing Supabase-dependent tests (signup-flow, admin-middleware,
        # audit-log-partition, rls-regression, etc.). --test-concurrency=1 mirrors
        # the existing test:integration script to avoid Supabase contention.
        run: node --env-file=.env.test --test --test-concurrency=1 tests/integration/*.test.js
